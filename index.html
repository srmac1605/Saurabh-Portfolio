<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saurabh Makwana — iOS Developer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #06080f;
  --bg2: #0b0f1a;
  --accent: #00e5ff;
  --accent2: #8b5cf6;
  --accent3: #00ff88;
  --yellow: #f0d060;
  --text: #eef2ff;
  --muted: #5a7090;
  --card: rgba(11,15,26,0.85);
  --border: rgba(0,229,255,0.12);
  --glow-cyan: 0 0 60px rgba(0,229,255,0.18);
  --glow-purple: 0 0 60px rgba(139,92,246,0.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Space Grotesk',sans-serif;
  overflow-x:hidden;
  cursor:none;
}
::selection{background:rgba(0,229,255,0.25);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--accent),var(--accent2));border-radius:2px;}

/* Custom cursor */
#cursor{
  position:fixed;width:12px;height:12px;border-radius:50%;
  background:var(--accent);pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:transform 0.1s,width 0.3s,height 0.3s,background 0.3s;
  mix-blend-mode:difference;
}
#cursor-ring{
  position:fixed;width:40px;height:40px;border-radius:50%;
  border:1px solid rgba(0,229,255,0.4);pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  transition:transform 0.15s ease,width 0.3s,height 0.3s,border-color 0.3s;
}
body:has(a:hover) #cursor,body:has(button:hover) #cursor{width:20px;height:20px;background:var(--accent2);}
body:has(a:hover) #cursor-ring,body:has(button:hover) #cursor-ring{width:60px;height:60px;border-color:rgba(139,92,246,0.5);}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 48px;
  background:rgba(6,8,15,0.6);
  backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,255,255,0.04);
  transition:all 0.4s;
}
.nav-logo{
  font-family:'JetBrains Mono',monospace;
  font-size:1.1rem;font-weight:700;
  letter-spacing:3px;color:var(--accent);
}
.nav-links{display:flex;gap:36px;list-style:none;align-items:center;}
.nav-links a{
  color:rgba(238,242,255,0.5);text-decoration:none;
  font-size:0.8rem;text-transform:uppercase;letter-spacing:2px;
  transition:color 0.3s;position:relative;
}
.nav-links a:hover{color:var(--text);}
.nav-links a::after{
  content:'';position:absolute;bottom:-4px;left:0;
  width:0;height:1px;background:var(--accent);transition:width 0.3s;
}
.nav-links a:hover::after{width:100%;}
.nav-social{display:flex;gap:16px;align-items:center;}
.nav-social a{
  color:var(--muted);font-size:0.8rem;text-decoration:none;
  transition:color 0.3s;font-family:'JetBrains Mono',monospace;
  letter-spacing:1px;
}
.nav-social a:hover{color:var(--accent);}

/* HERO */
.hero{
  min-height:100vh;display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:80px 48px 40px;
  gap:0;
  position:relative;overflow:hidden;
}
.hero-left{z-index:2;}
.hero-right{z-index:2;text-align:right;}
.hero-center{
  z-index:3;
  display:flex;flex-direction:column;align-items:center;
  position:relative;
}

/* 3D Avatar */
.avatar-wrap{
  position:relative;
  width:340px;height:380px;
  display:flex;align-items:flex-end;justify-content:center;
}
.avatar-glow{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:280px;height:80px;
  background:radial-gradient(ellipse,rgba(0,229,255,0.35) 0%,transparent 70%);
  filter:blur(20px);
  animation:glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{opacity:0.7;transform:translateX(-50%) scaleX(1);}
  50%{opacity:1;transform:translateX(-50%) scaleX(1.15);}
}
.avatar-base{
  width:200px;height:200px;border-radius:50%;
  background:linear-gradient(145deg,#1a2035,#0f1628);
  border:2px solid rgba(0,229,255,0.2);
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:2;
  box-shadow:0 0 80px rgba(0,229,255,0.2),0 0 160px rgba(139,92,246,0.1),inset 0 1px 0 rgba(255,255,255,0.08);
  animation:avatarFloat 4s ease-in-out infinite;
  cursor:none;
  transition:transform 0.3s;
}
.avatar-base:hover{transform:translateY(-8px) scale(1.05);}
@keyframes avatarFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-16px);}
}
.avatar-emoji{
  font-size:7rem;
  filter:drop-shadow(0 8px 32px rgba(0,229,255,0.4));
  animation:avatarBob 4s ease-in-out infinite;
  user-select:none;
}
@keyframes avatarBob{
  0%,100%{transform:scale(1) rotate(-2deg);}
  50%{transform:scale(1.05) rotate(2deg);}
}
/* Orbit rings */
.orbit-ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(0,229,255,0.15);
  top:50%;left:50%;transform:translate(-50%,-50%);
}
.orbit-1{width:260px;height:260px;animation:orbitSpin 12s linear infinite;}
.orbit-2{width:320px;height:320px;animation:orbitSpin 18s linear infinite reverse;border-color:rgba(139,92,246,0.12);}
.orbit-3{width:380px;height:380px;animation:orbitSpin 24s linear infinite;border-color:rgba(0,255,136,0.08);}
@keyframes orbitSpin{to{transform:translate(-50%,-50%) rotate(360deg);}}
.orbit-dot{
  position:absolute;width:8px;height:8px;border-radius:50%;
  top:0;left:50%;transform:translateX(-50%) translateY(-50%);
}
.dot-cyan{background:var(--accent);box-shadow:0 0 12px var(--accent);}
.dot-purple{background:var(--accent2);box-shadow:0 0 12px var(--accent2);}
.dot-green{background:var(--accent3);box-shadow:0 0 12px var(--accent3);}

/* Hero text */
.hero-greeting{
  font-family:'JetBrains Mono',monospace;
  font-size:0.85rem;color:var(--yellow);
  letter-spacing:3px;margin-bottom:12px;
  opacity:0;animation:slideInLeft 0.8s ease forwards 0.3s;
}
.hero-name{
  font-size:clamp(2.4rem,5vw,4rem);
  font-weight:700;line-height:1.0;
  letter-spacing:-2px;
  opacity:0;animation:slideInLeft 0.8s ease forwards 0.5s;
}
.hero-name span{
  display:block;color:rgba(238,242,255,0.9);
}
.hero-role-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(0,229,255,0.08);
  border:1px solid rgba(0,229,255,0.2);
  border-radius:100px;padding:8px 18px;
  font-family:'JetBrains Mono',monospace;
  font-size:0.78rem;color:var(--accent);
  margin-top:20px;
  opacity:0;animation:slideInLeft 0.8s ease forwards 0.7s;
}
.live-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--accent3);
  animation:livePulse 1.5s infinite;
  flex-shrink:0;
}
@keyframes livePulse{
  0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,0.5);}
  50%{box-shadow:0 0 0 6px rgba(0,255,136,0);}
}
.hero-social{
  display:flex;flex-direction:column;gap:12px;
  margin-top:36px;
  opacity:0;animation:slideInLeft 0.8s ease forwards 0.9s;
}
.social-link{
  display:flex;align-items:center;gap:10px;
  color:var(--muted);text-decoration:none;
  font-size:0.8rem;font-family:'JetBrains Mono',monospace;
  transition:all 0.3s;letter-spacing:1px;
}
.social-link:hover{color:var(--accent);transform:translateX(4px);}
.social-icon{font-size:1.1rem;}

/* Right side */
.hero-tagline{
  font-size:clamp(1rem,2vw,1.3rem);
  color:rgba(238,242,255,0.55);
  line-height:1.7;max-width:320px;
  margin-left:auto;text-align:right;
  opacity:0;animation:slideInRight 0.8s ease forwards 0.5s;
}
.hero-tagline strong{color:var(--accent);}
.hero-stats-right{
  display:flex;flex-direction:column;gap:20px;
  margin-top:40px;
  opacity:0;animation:slideInRight 0.8s ease forwards 0.8s;
}
.stat-pill{
  display:flex;align-items:center;gap:16px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;padding:14px 20px;
  transition:all 0.3s;
}
.stat-pill:hover{border-color:var(--border);background:rgba(0,229,255,0.04);transform:translateX(-4px);}
.stat-num{
  font-family:'JetBrains Mono',monospace;
  font-size:1.6rem;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.stat-info-label{font-size:0.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

/* Scroll indicator */
.scroll-indicator{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  opacity:0;animation:fadeIn 1s ease forwards 1.8s;
}
.scroll-line{
  width:1px;height:60px;
  background:linear-gradient(transparent,var(--accent));
  animation:scrollLine 2s ease-in-out infinite;
}
@keyframes scrollLine{
  0%{transform:scaleY(0);transform-origin:top;}
  50%{transform:scaleY(1);transform-origin:top;}
  51%{transform:scaleY(1);transform-origin:bottom;}
  100%{transform:scaleY(0);transform-origin:bottom;}
}
.scroll-label{
  font-family:'JetBrains Mono',monospace;
  font-size:0.65rem;color:var(--muted);
  letter-spacing:3px;text-transform:uppercase;
  writing-mode:vertical-rl;
}

/* Background elements */
.bg-grid{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);
}
.bg-orb{
  position:fixed;border-radius:50%;
  filter:blur(100px);pointer-events:none;z-index:0;
}
.orb-1{width:600px;height:600px;background:rgba(139,92,246,0.12);top:-200px;right:-150px;animation:orbDrift 15s ease-in-out infinite;}
.orb-2{width:500px;height:500px;background:rgba(0,229,255,0.08);bottom:0;left:-200px;animation:orbDrift 12s ease-in-out infinite reverse;}
.orb-3{width:300px;height:300px;background:rgba(0,255,136,0.06);top:50%;left:50%;transform:translate(-50%,-50%);animation:orbDrift 20s ease-in-out infinite;}
@keyframes orbDrift{
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(40px,-60px) scale(1.08);}
  66%{transform:translate(-30px,40px) scale(0.92);}
}

/* SECTIONS */
section{position:relative;z-index:1;}
.section-inner{max-width:1100px;margin:0 auto;padding:110px 32px;}
.section-eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:0.72rem;color:var(--accent3);
  text-transform:uppercase;letter-spacing:4px;
  margin-bottom:10px;display:flex;align-items:center;gap:12px;
}
.section-eyebrow::before{content:'';width:30px;height:1px;background:var(--accent3);}
.section-title{
  font-size:clamp(2rem,4vw,3rem);
  font-weight:700;letter-spacing:-1.5px;
  margin-bottom:70px;
}
.section-title .highlight{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ABOUT */
.about-layout{display:grid;grid-template-columns:1.1fr 0.9fr;gap:64px;align-items:center;}
.about-text p{
  color:rgba(238,242,255,0.65);line-height:1.85;
  font-size:1rem;margin-bottom:22px;
}
.about-text p strong{color:var(--accent);}
.about-tags{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;}
.tag{
  background:rgba(0,229,255,0.07);
  border:1px solid rgba(0,229,255,0.18);
  border-radius:6px;padding:5px 13px;
  font-size:0.78rem;color:rgba(238,242,255,0.8);
  font-family:'JetBrains Mono',monospace;
  transition:all 0.25s;
}
.tag:hover{background:rgba(0,229,255,0.15);color:var(--accent);border-color:rgba(0,229,255,0.4);}

/* Bio card */
.bio-card{
  background:linear-gradient(145deg,rgba(11,15,26,0.9),rgba(15,22,40,0.9));
  border:1px solid rgba(255,255,255,0.07);
  border-radius:24px;padding:36px;
  backdrop-filter:blur(20px);
  position:relative;overflow:hidden;
}
.bio-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);
}
.bio-avatar{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-size:2.8rem;margin:0 auto 20px;
  animation:avatarFloat 3s ease-in-out infinite;
  box-shadow:0 8px 32px rgba(0,229,255,0.25);
}
.bio-name{font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:4px;}
.bio-role{font-size:0.82rem;color:var(--accent);text-align:center;font-family:'JetBrains Mono',monospace;margin-bottom:24px;letter-spacing:1px;}
.bio-items{display:flex;flex-direction:column;gap:10px;}
.bio-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;border-radius:10px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.05);
  font-size:0.84rem;color:rgba(238,242,255,0.7);
  transition:all 0.25s;
}
.bio-item:hover{background:rgba(0,229,255,0.06);border-color:rgba(0,229,255,0.15);}
.bio-item-icon{font-size:1.1rem;flex-shrink:0;}

/* SKILLS */
.skills-section{background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 50%,var(--bg) 100%);}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
.skill-card{
  background:rgba(11,15,26,0.7);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:18px;padding:26px;
  backdrop-filter:blur(20px);
  transition:all 0.35s cubic-bezier(0.23,1,0.32,1);
  position:relative;overflow:hidden;
  cursor:default;
}
.skill-card::after{
  content:'';position:absolute;inset:0;border-radius:18px;
  background:linear-gradient(135deg,rgba(0,229,255,0.04),transparent 60%);
  opacity:0;transition:opacity 0.35s;
}
.skill-card:hover{transform:translateY(-6px) scale(1.01);border-color:rgba(0,229,255,0.25);box-shadow:var(--glow-cyan);}
.skill-card:hover::after{opacity:1;}
.skill-head{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.skill-icon-wrap{
  width:42px;height:42px;border-radius:12px;
  background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.2);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
}
.skill-title{font-size:0.92rem;font-weight:600;color:rgba(238,242,255,0.9);}
.skill-badges{display:flex;flex-wrap:wrap;gap:7px;}
.badge{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:6px;padding:3px 10px;
  font-size:0.74rem;color:rgba(238,242,255,0.65);
  font-family:'JetBrains Mono',monospace;
  transition:all 0.2s;
}
.badge:hover{background:rgba(0,229,255,0.1);border-color:rgba(0,229,255,0.3);color:var(--accent);}

/* EXPERIENCE */
.exp-section{background:linear-gradient(135deg,rgba(11,15,26,0.5),var(--bg));}
.timeline{position:relative;padding-left:28px;}
.timeline::before{
  content:'';position:absolute;left:0;top:12px;bottom:12px;
  width:1px;background:linear-gradient(180deg,var(--accent) 0%,var(--accent2) 50%,transparent 100%);
}
.tl-item{position:relative;margin-bottom:48px;}
.tl-marker{
  position:absolute;left:-34px;top:12px;
  width:13px;height:13px;border-radius:50%;
  background:var(--bg);border:2px solid var(--accent);
  box-shadow:0 0 16px rgba(0,229,255,0.6);
  transition:all 0.3s;
}
.tl-item:hover .tl-marker{background:var(--accent);box-shadow:0 0 24px rgba(0,229,255,0.9);}
.tl-card{
  background:rgba(11,15,26,0.8);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:20px;padding:30px 36px;
  backdrop-filter:blur(20px);
  transition:all 0.35s cubic-bezier(0.23,1,0.32,1);
}
.tl-card:hover{border-color:rgba(0,229,255,0.2);box-shadow:var(--glow-cyan);transform:translateX(6px);}
.tl-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:6px;}
.tl-role{font-size:1.18rem;font-weight:700;}
.tl-company{color:var(--accent);font-weight:600;font-size:1rem;margin-bottom:14px;}
.tl-pills{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px;}
.tl-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(0,229,255,0.07);border:1px solid rgba(0,229,255,0.15);
  border-radius:100px;padding:4px 14px;
  font-size:0.72rem;color:var(--muted);font-family:'JetBrains Mono',monospace;
}
.tl-list{list-style:none;}
.tl-list li{
  position:relative;padding:6px 0 6px 20px;
  color:rgba(238,242,255,0.65);font-size:0.88rem;line-height:1.7;
  border-bottom:1px solid rgba(255,255,255,0.03);
}
.tl-list li:last-child{border-bottom:none;}
.tl-list li::before{
  content:'›';position:absolute;left:0;
  color:var(--accent3);font-size:1rem;line-height:1.6;
}

/* PROJECTS */
.projects-section{background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px;}
.proj-card{
  background:rgba(11,15,26,0.85);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:22px;padding:30px;
  backdrop-filter:blur(20px);
  transition:all 0.4s cubic-bezier(0.23,1,0.32,1);
  position:relative;overflow:hidden;cursor:default;
}
.proj-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,229,255,0.04) 0%,rgba(139,92,246,0.04) 100%);
  opacity:0;transition:opacity 0.4s;
}
.proj-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));
  transform:scaleX(0);transition:transform 0.4s cubic-bezier(0.23,1,0.32,1);
  transform-origin:left;
}
.proj-card:hover{transform:translateY(-10px);border-color:rgba(0,229,255,0.3);box-shadow:0 24px 60px rgba(0,0,0,0.5),var(--glow-cyan);}
.proj-card:hover::before{opacity:1;}
.proj-card:hover::after{transform:scaleX(1);}
.proj-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.proj-emoji-wrap{
  width:56px;height:56px;border-radius:16px;
  background:linear-gradient(135deg,rgba(0,229,255,0.12),rgba(139,92,246,0.12));
  border:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;
  transition:transform 0.3s;
}
.proj-card:hover .proj-emoji-wrap{transform:scale(1.1) rotate(5deg);}
.proj-store-btn{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
  border-radius:100px;padding:5px 12px;
  color:rgba(238,242,255,0.6);text-decoration:none;
  font-size:0.7rem;font-family:'JetBrains Mono',monospace;
  transition:all 0.25s;white-space:nowrap;
}

/* ── Cursor ── */
function Cursor() {
  useEffect(() => {
    const cur = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');
    let rx = 0, ry = 0;
    const move = e => {
      cur.style.left = e.clientX + 'px';
      cur.style.top = e.clientY + 'px';
      rx += (e.clientX - rx) * 0.12;
      ry += (e.clientY - ry) * 0.12;
    };
    const lerp = () => {
      rx += (parseFloat(cur.style.left||0) - rx) * 0.12;
      ry += (parseFloat(cur.style.top||0) - ry) * 0.12;
      ring.style.left = rx + 'px';
      ring.style.top = ry + 'px';
      requestAnimationFrame(lerp);
    };
    document.addEventListener('mousemove', move);
    lerp();
    return () => document.removeEventListener('mousemove', move);
  }, []);
  return null;
}

/* ── Particles ── */
function Particles() {
  useEffect(() => {
    const c = document.getElementById('pcanvas');
    const ctx = c.getContext('2d');
    let pts = [], raf;
    const resize = () => { c.width = innerWidth; c.height = innerHeight; };
    resize();
    window.addEventListener('resize', resize);
    for (let i = 0; i < 70; i++) pts.push({
      x: Math.random()*innerWidth, y: Math.random()*innerHeight,
      vx: (Math.random()-.5)*.35, vy: (Math.random()-.5)*.35,
      r: Math.random()*1.4+.3, a: Math.random()*.5+.1
    });
    const draw = () => {
      ctx.clearRect(0,0,c.width,c.height);
      pts.forEach(p => {
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0)p.x=c.width; if(p.x>c.width)p.x=0;
        if(p.y<0)p.y=c.height; if(p.y>c.height)p.y=0;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(0,229,255,${p.a})`; ctx.fill();
      });
      for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.hypot(dx,dy);
        if(d<120){
          ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`rgba(0,229,255,${.06*(1-d/120)})`; ctx.lineWidth=.5; ctx.stroke();
        }
      }
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);
  return null;
}

/* ── Typing ── */
function Typer({ words }) {
  const [idx, setIdx] = useState(0);
  const [txt, setTxt] = useState('');
  const [del, setDel] = useState(false);
  useEffect(() => {
    const w = words[idx];
    let t;
    if (!del && txt === w) t = setTimeout(() => setDel(true), 2200);
    else if (del && txt === '') { setDel(false); setIdx(i=>(i+1)%words.length); }
    else t = setTimeout(() => setTxt(del ? w.slice(0,txt.length-1) : w.slice(0,txt.length+1)), del?45:80);
    return () => clearTimeout(t);
  }, [txt, del, idx, words]);
  return <span>{txt}<span className="caret"></span></span>;
}

/* ── Scroll reveal ── */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const ob = new IntersectionObserver(e => e.forEach(x => { if(x.isIntersecting) x.target.classList.add('vis'); }), { threshold: 0.08 });
    els.forEach(el => ob.observe(el));
    return () => ob.disconnect();
  });
}

/* ── Counter ── */
function Counter({ target, suffix='' }) {
  const [val, setVal] = useState(0);
  const ref = useRef();
  useEffect(() => {
    const ob = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        let start = 0;
        const end = parseInt(target);
        const step = Math.ceil(end / 40);
        const t = setInterval(() => {
          start = Math.min(start + step, end);
          setVal(start);
          if (start >= end) clearInterval(t);
        }, 40);
        ob.disconnect();
      }
    });
    if (ref.current) ob.observe(ref.current);
    return () => ob.disconnect();
  }, [target]);
  return <span ref={ref}>{val}{suffix}</span>;
}
