<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saurabh Makwana — iOS Developer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #06080f;
  --bg2: #0b0f1a;
  --accent: #00e5ff;
  --accent2: #8b5cf6;
  --accent3: #00ff88;
  --yellow: #f0d060;
  --text: #eef2ff;
  --muted: #5a7090;
  --card: rgba(11,15,26,0.85);
  --border: rgba(0,229,255,0.12);
  --glow-cyan: 0 0 60px rgba(0,229,255,0.18);
  --glow-purple: 0 0 60px rgba(139,92,246,0.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Space Grotesk',sans-serif;
  overflow-x:hidden;
  cursor:none;
}
::selection{background:rgba(0,229,255,0.25);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--accent),var(--accent2));border-radius:2px;}

/* Custom cursor */
#cursor{
  position:fixed;width:12px;height:12px;border-radius:50%;
  background:var(--accent);pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:transform 0.1s,width 0.3s,height 0.3s,background 0.3s;
  mix-blend-mode:difference;
}
#cursor-ring{
  position:fixed;width:40px;height:40px;border-radius:50%;
  border:1px solid rgba(0,229,255,0.4);pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  transition:transform 0.15s ease,width 0.3s,height 0.3s,border-color 0.3s;
}
body:has(a:hover) #cursor,body:has(button:hover) #cursor{width:20px;height:20px;background:var(--accent2);}
body:has(a:hover) #cursor-ring,body:has(button:hover) #cursor-ring{width:60px;height:60px;border-color:rgba(139,92,246,0.5);}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 48px;
  background:rgba(6,8,15,0.6);
  backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,255,255,0.04);
  transition:all 0.4s;
}
.nav-logo{
  font-family:'JetBrains Mono',monospace;
  font-size:1.1rem;font-weight:700;
  letter-spacing:3px;color:var(--accent);
}
.nav-links{display:flex;gap:36px;list-style:none;align-items:center;}
.nav-links a{
  color:rgba(238,242,255,0.5);text-decoration:none;
  font-size:0.8rem;text-transform:uppercase;letter-spacing:2px;
  transition:color 0.3s;position:relative;
}
.nav-links a:hover{color:var(--text);}
.nav-links a::after{
  content:'';position:absolute;bottom:-4px;left:0;
  width:0;height:1px;background:var(--accent);transition:width 0.3s;
}
.nav-links a:hover::after{width:100%;}
.nav-social{display:flex;gap:16px;align-items:center;}
.nav-social a{
  color:var(--muted);font-size:0.8rem;text-decoration:none;
  transition:color 0.3s;font-family:'JetBrains Mono',monospace;
  letter-spacing:1px;
}
.nav-social a:hover{color:var(--accent);}

/* HERO */
.hero{
  min-height:100vh;display:grid;
  grid-template-columns:minmax(0,360px) minmax(0,420px) minmax(0,360px);
  justify-content:center;
  align-items:center;
  padding:80px 48px 40px;
  gap:24px;
  position:relative;overflow:hidden;
  max-width:1440px;margin:0 auto;
}
.code-rain-canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
  z-index:0;
  opacity:0.5;
  pointer-events:none;
  -webkit-mask-image:radial-gradient(ellipse 70% 60% at 50% 45%,transparent 30%,black 90%);
  mask-image:radial-gradient(ellipse 70% 60% at 50% 45%,transparent 30%,black 90%);
}
.hero-left{z-index:2;min-width:0;}
.hero-right{z-index:2;text-align:right;min-width:0;display:flex;flex-direction:column;align-items:flex-end;}
.hero-center{
  z-index:3;
  display:flex;flex-direction:column;align-items:center;
  position:relative;
}

/* ════════════════════════════════════════════════════
   PREMIUM DEVELOPER MASCOT — SVG-based avatar
   Replaces old CSS-shape bitmoji with vector illustration
   ════════════════════════════════════════════════════ */
.avatar-wrap{
  position:relative;
  width:380px;height:420px;
  display:flex;align-items:flex-end;justify-content:center;
  perspective:900px;
}
.avatar-glow{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:320px;height:100px;
  background:radial-gradient(ellipse,rgba(0,229,255,0.4) 0%,transparent 70%);
  filter:blur(22px);
  animation:glowPulse 3s ease-in-out infinite;
  z-index:0;
}
@keyframes glowPulse{
  0%,100%{opacity:0.7;transform:translateX(-50%) scaleX(1);}
  50%{opacity:1;transform:translateX(-50%) scaleX(1.15);}
}

/* Mascot stage — holds desk scene + character */
.mascot-stage{
  position:relative; z-index:2;
  width:340px; height:360px;
  display:flex; align-items:flex-end; justify-content:center;
  animation:mascotIn 1s cubic-bezier(.2,.8,.2,1) both 0.15s;
  transform-style:preserve-3d;
  will-change:transform;
}
@keyframes mascotIn{
  from{opacity:0;transform:scale(0.85) translateY(24px);}
  to{opacity:1;transform:scale(1) translateY(0);}
}

/* Floating glassmorphism dev-icon chips around the mascot */
.float-chip{
  position:absolute;
  display:flex;align-items:center;justify-content:center;
  width:38px;height:38px;border-radius:11px;
  background:rgba(13,20,33,0.55);
  border:1px solid rgba(0,229,255,0.25);
  backdrop-filter:blur(10px);
  box-shadow:0 6px 20px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
  font-size:1.05rem;
  z-index:5;
  pointer-events:none;
}
.chip-swift{ top:8%; left:-6%; animation:chipFloat 6s ease-in-out infinite; }
.chip-xcode{ top:4%; right:-8%; animation:chipFloat 7s ease-in-out infinite 0.6s; }
.chip-git{ bottom:30%; left:-10%; animation:chipFloat 5.5s ease-in-out infinite 1.1s; }
.chip-terminal{ bottom:18%; right:-9%; animation:chipFloat 6.5s ease-in-out infinite 0.4s; }
.chip-apple{ top:32%; right:-12%; animation:chipFloat 7.5s ease-in-out infinite 1.6s; }
@keyframes chipFloat{
  0%,100%{ transform:translateY(0) rotate(0deg); }
  50%{ transform:translateY(-10px) rotate(3deg); }
}

/* SVG character wrapper — this is what tilts toward cursor */
.mascot-svg-wrap{
  position:relative; z-index:3;
  width:240px;
  cursor:none;
  transform-style:preserve-3d;
  will-change:transform;
}
.mascot-svg-wrap svg{ display:block; width:100%; height:auto; overflow:visible; }
.mascot-photo{
  display:block;
  width:100%;
  height:auto;
  object-fit:contain;
  filter:drop-shadow(0 18px 40px rgba(0,0,0,0.55));
  user-select:none;
  -webkit-user-drag:none;
}

/* Desk + monitor scene behind character */
.mascot-desk{
  position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:330px; z-index:1;
}
.mascot-desk svg{ display:block; width:100%; height:auto; }

/* Monitor screen code lines (animated typing) */
.screen-line{
  transform-origin:left center;
  animation:typeLine 4s steps(20,end) infinite;
}
.screen-line:nth-child(1){ animation-delay:0s; }
.screen-line:nth-child(2){ animation-delay:0.4s; }
.screen-line:nth-child(3){ animation-delay:0.8s; }
.screen-line:nth-child(4){ animation-delay:1.2s; }
.screen-line:nth-child(5){ animation-delay:1.6s; }
@keyframes typeLine{
  0%,8%{ transform:scaleX(0); opacity:0.4; }
  20%,80%{ transform:scaleX(1); opacity:1; }
  92%,100%{ transform:scaleX(1); opacity:0.4; }
}
.screen-flicker{ animation:screenFlicker 5s ease-in-out infinite; }
@keyframes screenFlicker{
  0%,94%,100%{ opacity:1; }
  95%{ opacity:0.85; }
  96%{ opacity:1; }
  97%{ opacity:0.9; }
}
.laptop-glow-bar{ animation:laptopPulse 2.4s ease-in-out infinite; }
@keyframes laptopPulse{
  0%,100%{ opacity:0.6; }
  50%{ opacity:1; }
}

/* Eyes — GSAP-driven via transform on pupil groups (desktop only) */
.mascot-pupil{
  transition:none; /* movement handled by GSAP quickTo for smoothness */
}
.mascot-eyelid{
  transform-origin:center;
}

/* Breathing / idle sway applied to whole character group via GSAP,
   shoulder sway applied to a separate inner group */
.mascot-head-group{ transform-origin:50% 85%; }
.mascot-shoulder-group{ transform-origin:50% 100%; }

/* Steam wisps from coffee mug */
.steam{
  animation:steamRise 3s ease-in-out infinite;
  transform-origin:bottom center;
}
.steam:nth-child(2){ animation-delay:0.6s; }
.steam:nth-child(3){ animation-delay:1.2s; }
@keyframes steamRise{
  0%{ opacity:0; transform:translateY(0) scale(1); }
  30%{ opacity:0.5; }
  100%{ opacity:0; transform:translateY(-14px) scale(1.3); }
}

/* Floating code-symbol particles around the whole stage */
.code-particle{
  position:absolute; font-family:'JetBrains Mono',monospace;
  font-size:0.85rem; color:rgba(0,229,255,0.35);
  pointer-events:none; z-index:4; user-select:none;
  animation:codeParticleFloat 8s ease-in-out infinite;
}
@keyframes codeParticleFloat{
  0%,100%{ transform:translateY(0) translateX(0); opacity:0.25; }
  50%{ transform:translateY(-18px) translateX(6px); opacity:0.6; }
}

/* Disable eye-follow + heavy motion on touch/mobile for performance */
@media (hover:none) and (pointer:coarse){
  .mascot-svg-wrap{ transform:none !important; }
  .float-chip{ animation-duration:9s; }
}
/* Orbit rings */
.orbit-ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(0,229,255,0.15);
  top:50%;left:50%;transform:translate(-50%,-50%);
}
.orbit-1{width:260px;height:260px;animation:orbitSpin 12s linear infinite;}
.orbit-2{width:320px;height:320px;animation:orbitSpin 18s linear infinite reverse;border-color:rgba(139,92,246,0.12);}
.orbit-3{width:380px;height:380px;animation:orbitSpin 24s linear infinite;border-color:rgba(0,255,136,0.08);}
@keyframes orbitSpin{to{transform:translate(-50%,-50%) rotate(360deg);}}
.orbit-dot{
  position:absolute;width:8px;height:8px;border-radius:50%;
  top:0;left:50%;transform:translateX(-50%) translateY(-50%);
}
.dot-cyan{background:var(--accent);box-shadow:0 0 12px var(--accent);}
.dot-purple{background:var(--accent2);box-shadow:0 0 12px var(--accent2);}
.dot-green{background:var(--accent3);box-shadow:0 0 12px var(--accent3);}

/* Hero text */
.hero-greeting{
  font-family:'JetBrains Mono',monospace;
  font-size:0.85rem;color:var(--yellow);
  letter-spacing:3px;margin-bottom:12px;
  opacity:0;animation:slideInLeft 0.8s ease forwards 0.3s;
}
.hero-name{
  font-size:clamp(2.4rem,5vw,4rem);
  font-weight:700;line-height:1.0;
  letter-spacing:-2px;
  opacity:0;animation:slideInLeft 0.8s ease forwards 0.5s;
}
.hero-name span{
  display:block;color:rgba(238,242,255,0.9);
}
.hero-role-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(0,229,255,0.08);
  border:1px solid rgba(0,229,255,0.2);
  border-radius:100px;padding:8px 18px;
  font-family:'JetBrains Mono',monospace;
  font-size:0.78rem;color:var(--accent);
  margin-top:20px;
  opacity:0;animation:slideInLeft 0.8s ease forwards 0.7s;
}
.live-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--accent3);
  animation:livePulse 1.5s infinite;
  flex-shrink:0;
}
@keyframes livePulse{
  0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,0.5);}
  50%{box-shadow:0 0 0 6px rgba(0,255,136,0);}
}
.hero-social{
  display:flex;flex-direction:column;gap:12px;
  margin-top:36px;
  opacity:0;animation:slideInLeft 0.8s ease forwards 0.9s;
}
.social-link{
  display:flex;align-items:center;gap:10px;
  color:var(--muted);text-decoration:none;
  font-size:0.8rem;font-family:'JetBrains Mono',monospace;
  transition:all 0.3s;letter-spacing:1px;
}
.social-link:hover{color:var(--accent);transform:translateX(4px);}
.social-icon{font-size:1.1rem;}

/* Right side */
.hero-tagline{
  font-size:clamp(0.95rem,1.6vw,1.2rem);
  color:rgba(238,242,255,0.55);
  line-height:1.7;max-width:340px;width:100%;
  margin-left:auto;text-align:right;
  opacity:0;animation:slideInRight 0.8s ease forwards 0.5s;
}
.hero-tagline strong{color:var(--accent);}
.hero-stats-right{
  display:flex;flex-direction:column;gap:16px;
  margin-top:36px;
  width:100%;max-width:340px;
}
@keyframes statPop{
  from{opacity:0;transform:translateX(24px) scale(0.92);}
  to{opacity:1;transform:translateX(0) scale(1);}
}
.stat-pill{
  display:flex;align-items:center;justify-content:flex-end;gap:14px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;padding:12px 18px;
  transition:all 0.3s cubic-bezier(.2,.8,.2,1);
  width:100%;
}
.stat-pill:hover{border-color:var(--border);background:rgba(0,229,255,0.06);transform:translateX(-6px) scale(1.02);box-shadow:0 8px 24px rgba(0,229,255,0.12);}
.stat-num{
  font-family:'JetBrains Mono',monospace;
  font-size:1.45rem;font-weight:700;white-space:nowrap;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.stat-info-label{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;}

/* Scroll indicator */
.scroll-indicator{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  opacity:0;animation:fadeIn 1s ease forwards 1.8s;
}
.scroll-line{
  width:1px;height:60px;
  background:linear-gradient(transparent,var(--accent));
  animation:scrollLine 2s ease-in-out infinite;
}
@keyframes scrollLine{
  0%{transform:scaleY(0);transform-origin:top;}
  50%{transform:scaleY(1);transform-origin:top;}
  51%{transform:scaleY(1);transform-origin:bottom;}
  100%{transform:scaleY(0);transform-origin:bottom;}
}
.scroll-label{
  font-family:'JetBrains Mono',monospace;
  font-size:0.65rem;color:var(--muted);
  letter-spacing:3px;text-transform:uppercase;
  writing-mode:vertical-rl;
}

/* Background elements */
.bg-grid{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);
}
.bg-orb{
  position:fixed;border-radius:50%;
  filter:blur(100px);pointer-events:none;z-index:0;
}
.orb-1{width:600px;height:600px;background:rgba(139,92,246,0.12);top:-200px;right:-150px;animation:orbDrift 15s ease-in-out infinite;}
.orb-2{width:500px;height:500px;background:rgba(0,229,255,0.08);bottom:0;left:-200px;animation:orbDrift 12s ease-in-out infinite reverse;}
.orb-3{width:300px;height:300px;background:rgba(0,255,136,0.06);top:50%;left:50%;transform:translate(-50%,-50%);animation:orbDrift 20s ease-in-out infinite;}
@keyframes orbDrift{
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(40px,-60px) scale(1.08);}
  66%{transform:translate(-30px,40px) scale(0.92);}
}

/* SECTIONS */
section{position:relative;z-index:1;}
.section-inner{max-width:1100px;margin:0 auto;padding:110px 32px;}
.section-eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:0.72rem;color:var(--accent3);
  text-transform:uppercase;letter-spacing:4px;
  margin-bottom:10px;display:flex;align-items:center;gap:12px;
}
.section-eyebrow::before{content:'';width:30px;height:1px;background:var(--accent3);}
.section-title{
  font-size:clamp(2rem,4vw,3rem);
  font-weight:700;letter-spacing:-1.5px;
  margin-bottom:70px;
}
.section-title .highlight{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ABOUT */
.about-layout{display:grid;grid-template-columns:1.1fr 0.9fr;gap:64px;align-items:center;}
.about-text p{
  color:rgba(238,242,255,0.65);line-height:1.85;
  font-size:1rem;margin-bottom:22px;
}
.about-text p strong{color:var(--accent);}
.about-tags{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;}
.tag{
  background:rgba(0,229,255,0.07);
  border:1px solid rgba(0,229,255,0.18);
  border-radius:6px;padding:5px 13px;
  font-size:0.78rem;color:rgba(238,242,255,0.8);
  font-family:'JetBrains Mono',monospace;
  transition:all 0.25s;
}
.tag:hover{background:rgba(0,229,255,0.15);color:var(--accent);border-color:rgba(0,229,255,0.4);}

/* Bio card */
.bio-card{
  background:linear-gradient(145deg,rgba(11,15,26,0.9),rgba(15,22,40,0.9));
  border:1px solid rgba(255,255,255,0.07);
  border-radius:24px;padding:36px;
  backdrop-filter:blur(20px);
  position:relative;overflow:hidden;
}
.bio-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);
}
.bio-avatar{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-size:2.8rem;margin:0 auto 20px;
  animation:avatarFloat 3s ease-in-out infinite;
  box-shadow:0 8px 32px rgba(0,229,255,0.25);
}
.bio-name{font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:4px;}
.bio-role{font-size:0.82rem;color:var(--accent);text-align:center;font-family:'JetBrains Mono',monospace;margin-bottom:24px;letter-spacing:1px;}
.bio-items{display:flex;flex-direction:column;gap:10px;}
.bio-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;border-radius:10px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.05);
  font-size:0.84rem;color:rgba(238,242,255,0.7);
  transition:all 0.25s;
}
.bio-item:hover{background:rgba(0,229,255,0.06);border-color:rgba(0,229,255,0.15);}
.bio-item-icon{font-size:1.1rem;flex-shrink:0;}

/* SKILLS */
.skills-section{background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 50%,var(--bg) 100%);}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
.skill-card{
  background:rgba(11,15,26,0.7);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:18px;padding:26px;
  backdrop-filter:blur(20px);
  transition:all 0.35s cubic-bezier(0.23,1,0.32,1);
  position:relative;overflow:hidden;
  cursor:default;
}
.skill-card::after{
  content:'';position:absolute;inset:0;border-radius:18px;
  background:linear-gradient(135deg,rgba(0,229,255,0.04),transparent 60%);
  opacity:0;transition:opacity 0.35s;
}
.skill-card:hover{transform:translateY(-6px) scale(1.01);border-color:rgba(0,229,255,0.25);box-shadow:var(--glow-cyan);}
.skill-card:hover::after{opacity:1;}
.skill-head{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.skill-icon-wrap{
  width:42px;height:42px;border-radius:12px;
  background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.2);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
}
.skill-title{font-size:0.92rem;font-weight:600;color:rgba(238,242,255,0.9);}
.skill-badges{display:flex;flex-wrap:wrap;gap:7px;}
.badge{

<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<div class="bg-grid"></div>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>
<canvas id="pcanvas" style="position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.35;"></canvas>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Cursor ── */
function Cursor() {
  useEffect(() => {
    const cur = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');
    let rx = 0, ry = 0;
    const move = e => {
      cur.style.left = e.clientX + 'px';
      cur.style.top = e.clientY + 'px';
      rx += (e.clientX - rx) * 0.12;
      ry += (e.clientY - ry) * 0.12;
    };
    const lerp = () => {
      rx += (parseFloat(cur.style.left||0) - rx) * 0.12;
      ry += (parseFloat(cur.style.top||0) - ry) * 0.12;
      ring.style.left = rx + 'px';
      ring.style.top = ry + 'px';
      requestAnimationFrame(lerp);
    };
    document.addEventListener('mousemove', move);
    lerp();
    return () => document.removeEventListener('mousemove', move);
  }, []);
  return null;
}

/* ── Code Rain (hero background) ── */
function CodeRain() {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current;
    const ctx = c.getContext('2d');
    let raf;
    const chars = 'SwiftUI(){}<>[]=>:;01 import struct func var let @State ViewModifier MVVM API'.split(' ');
    const fontSize = 14;
    let columns, drops;

    const resize = () => {
      c.width = c.parentElement.offsetWidth;
      c.height = c.parentElement.offsetHeight;
      columns = Math.floor(c.width / fontSize);
      drops = new Array(columns).fill(0).map(() => Math.random() * -100);
    };
    resize();
    window.addEventListener('resize', resize);

    const draw = () => {
      ctx.fillStyle = 'rgba(6,8,15,0.08)';
      ctx.fillRect(0, 0, c.width, c.height);
      ctx.font = fontSize + 'px JetBrains Mono, monospace';
      for (let i = 0; i < columns; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)][0] || '0';
        const x = i * fontSize;
        const y = drops[i] * fontSize;
        const grad = ctx.createLinearGradient(0, y - 20, 0, y);
        ctx.fillStyle = Math.random() > 0.985 ? 'rgba(0,255,136,0.5)' : 'rgba(0,229,255,0.18)';
        ctx.fillText(text, x, y);
        if (y > c.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);
  return <canvas ref={ref} className="code-rain-canvas" aria-hidden="true"></canvas>;
}

/* ── Particles ── */
function Particles() {
  useEffect(() => {
    const c = document.getElementById('pcanvas');
    const ctx = c.getContext('2d');
    let pts = [], raf;
    const resize = () => { c.width = innerWidth; c.height = innerHeight; };
    resize();
    window.addEventListener('resize', resize);
    for (let i = 0; i < 70; i++) pts.push({
      x: Math.random()*innerWidth, y: Math.random()*innerHeight,
      vx: (Math.random()-.5)*.35, vy: (Math.random()-.5)*.35,
      r: Math.random()*1.4+.3, a: Math.random()*.5+.1
    });
    const draw = () => {
      ctx.clearRect(0,0,c.width,c.height);
      pts.forEach(p => {
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0)p.x=c.width; if(p.x>c.width)p.x=0;
        if(p.y<0)p.y=c.height; if(p.y>c.height)p.y=0;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(0,229,255,${p.a})`; ctx.fill();
      });
      for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.hypot(dx,dy);
        if(d<120){
          ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`rgba(0,229,255,${.06*(1-d/120)})`; ctx.lineWidth=.5; ctx.stroke();
        }
      }
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);
  return null;
}

/* ── Avatar Parallax Tilt ── */
/* ════════════════════════════════════════════════════
   PREMIUM MASCOT ANIMATION SYSTEM (GSAP-powered)
   ────────────────────────────────────────────────────
   Handles:
   1. Eye tracking — pupils follow cursor with bounded movement,
      smoothed via gsap.quickTo (GPU-accelerated, 60fps, no jump/lag)
   2. Idle breathing — subtle scale/translate loop on shoulder group
   3. Blinking — randomized interval every 3–6s, eyelid scaleY animation
   4. Head micro-movement — gentle independent sway, layered under
      the cursor-tilt so it never looks robotic
   5. Occasional smile pulse — mouth path subtly animates every ~8–14s
   6. Mobile/touch — eye tracking + tilt disabled, idle animations kept
   ════════════════════════════════════════════════════ */
function useMascotAnimation() {
  useEffect(() => {
    if (typeof gsap === 'undefined') return; // graceful fallback if CDN blocked

    const isTouch = window.matchMedia('(hover: none) and (pointer: coarse)').matches;

    const wrapEl   = document.getElementById('mascotTilt');
    const stageEl  = wrapEl ? wrapEl.closest('.avatar-wrap') : null;
    const pupilL   = document.getElementById('pupilGroupL');
    const pupilR   = document.getElementById('pupilGroupR');
    const eyelidL  = document.getElementById('eyelidL');
    const eyelidR  = document.getElementById('eyelidR');
    const headGrp  = wrapEl ? wrapEl.querySelector('.mascot-head-group') : null;
    const shoulderGrp = wrapEl ? wrapEl.querySelector('.mascot-shoulder-group') : null;
    const mouth    = document.getElementById('mascotMouth');

    if (!wrapEl) return;

    let ctx = gsap.context(() => {});
    const timers = [];

    /* ── 1. Idle breathing (shoulders) — always on, desktop + mobile ── */
    if (shoulderGrp) {
      gsap.to(shoulderGrp, {
        y: 2.5,
        duration: 2.2,
        ease: 'sine.inOut',
        repeat: -1,
        yoyo: true,
        transformOrigin: '50% 100%',
      });
    }

    /* ── 2. Subtle independent head sway (always on) ── */
    if (headGrp) {
      gsap.to(headGrp, {
        y: 1.5,
        rotation: 0.6,
        duration: 3.4,
        ease: 'sine.inOut',
        repeat: -1,
        yoyo: true,
        transformOrigin: '50% 90%',
      });
    }

    /* ── 3. Randomized blinking every 3–6s ── */
    function blink() {
      const targets = [eyelidL, eyelidR].filter(Boolean);
      if (targets.length) {
        gsap.to(targets, {
          scaleY: 0.08,
          duration: 0.07,
          ease: 'power1.in',
          transformOrigin: 'center center',
          yoyo: true,
          repeat: 1,
        });
      }
      const next = 3000 + Math.random() * 3000; // 3–6s
      timers.push(setTimeout(blink, next));
    }
    timers.push(setTimeout(blink, 1800));

    /* ── 4. Occasional smile pulse every 8–14s ── */
    function smilePulse() {
      if (mouth) {
        gsap.to(mouth, {
          attr: { d: 'M106 176 Q120 188 134 176' },
          duration: 0.6,
          ease: 'sine.inOut',
          yoyo: true,
          repeat: 1,
        });
      }
      const next = 8000 + Math.random() * 6000; // 8–14s
      timers.push(setTimeout(smilePulse, next));
    }
    timers.push(setTimeout(smilePulse, 5000));

    /* ── 5. Eye tracking + head tilt (desktop only, GPU accelerated) ── */
    let xTo, yTo, pupilLxTo, pupilLyTo, pupilRxTo, pupilRyTo;
    let onMove, onLeave;

    if (!isTouch && stageEl) {
      // quickTo = GSAP's optimized, interruption-safe tween setter — buttery smooth, no jank
      xTo = gsap.quickTo(wrapEl, 'rotationY', { duration: 0.5, ease: 'power3.out' });
      yTo = gsap.quickTo(wrapEl, 'rotationX', { duration: 0.5, ease: 'power3.out' });

      if (pupilL && pupilR) {
        pupilLxTo = gsap.quickTo(pupilL, 'x', { duration: 0.35, ease: 'power3.out' });
        pupilLyTo = gsap.quickTo(pupilL, 'y', { duration: 0.35, ease: 'power3.out' });
        pupilRxTo = gsap.quickTo(pupilR, 'x', { duration: 0.35, ease: 'power3.out' });
        pupilRyTo = gsap.quickTo(pupilR, 'y', { duration: 0.35, ease: 'power3.out' });
      }

      onMove = (e) => {
        const rect = stageEl.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = (e.clientX - cx) / (rect.width / 2);
        const dy = (e.clientY - cy) / (rect.height / 2);
        const cdx = Math.max(-1, Math.min(1, dx));
        const cdy = Math.max(-1, Math.min(1, dy));

        // Head tilt — bounded, natural range (matches Apple Vision Pro-style subtlety)
        xTo(cdx * 9);
        yTo(cdy * -7);

        // Pupils — bounded movement within eye socket radius (realistic, no jumping)
        const ex = cdx * 3.4;
        const ey = cdy * 2.8;
        if (pupilLxTo) { pupilLxTo(ex); pupilLyTo(ey); pupilRxTo(ex); pupilRyTo(ey); }
      };

      onLeave = () => {
        xTo(0); yTo(0);
        if (pupilLxTo) { pupilLxTo(0); pupilLyTo(0); pupilRxTo(0); pupilRyTo(0); }
      };

      window.addEventListener('mousemove', onMove, { passive: true });
      stageEl.addEventListener('mouseleave', onLeave);
    } else {
      // Mobile/touch: ensure no residual transforms, keep idle-only animation
      gsap.set(wrapEl, { rotationX: 0, rotationY: 0 });
    }

    return () => {
      timers.forEach(clearTimeout);
      gsap.killTweensOf([shoulderGrp, headGrp, eyelidL, eyelidR, mouth, wrapEl, pupilL, pupilR].filter(Boolean));
      if (onMove) window.removeEventListener('mousemove', onMove);
      if (stageEl && onLeave) stageEl.removeEventListener('mouseleave', onLeave);
      ctx.revert();
    };
  }, []);
}

/* ── Typing ── */
function Typer({ words }) {
  const [idx, setIdx] = useState(0);
  const [txt, setTxt] = useState('');
  const [del, setDel] = useState(false);
  useEffect(() => {
    const w = words[idx];
    let t;
    if (!del && txt === w) t = setTimeout(() => setDel(true), 2200);
    else if (del && txt === '') { setDel(false); setIdx(i=>(i+1)%words.length); }
    else t = setTimeout(() => setTxt(del ? w.slice(0,txt.length-1) : w.slice(0,txt.length+1)), del?45:80);
    return () => clearTimeout(t);
  }, [txt, del, idx, words]);
  return <span>{txt}<span className="caret"></span></span>;
}

/* ── Scroll reveal ── */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const ob = new IntersectionObserver(e => e.forEach(x => { if(x.isIntersecting) x.target.classList.add('vis'); }), { threshold: 0.08 });
    els.forEach(el => ob.observe(el));
    return () => ob.disconnect();
  });
}

/* ── Counter ── */
function Counter({ target, suffix='' }) {
  const [val, setVal] = useState(0);
  const ref = useRef();
  useEffect(() => {
    const ob = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        let start = 0;
        const end = parseInt(target);
        const step = Math.ceil(end / 40);
        const t = setInterval(() => {
          start = Math.min(start + step, end);
          setVal(start);
          if (start >= end) clearInterval(t);
        }, 40);
        ob.disconnect();
      }
    });
    if (ref.current) ob.observe(ref.current);
    return () => ob.disconnect();
  }, [target]);
  return <span ref={ref}>{val}{suffix}</span>;
}
